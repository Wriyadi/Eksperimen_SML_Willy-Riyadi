name: Automated Data Preprocessing

on:
  push:
    paths:
      - 'stroke_risk_dataset_raw/**'
      - 'preprocessing/automate_WillyRiyadi.py'
  workflow_dispatch:

jobs:
  build-and-preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run Automate Preprocessing
        run: |
          cd preprocessing
          python automate_WillyRiyadi.py

      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add preprocessing/stroke_risk_dataset_preprocessing/

          if git diff --staged --quiet; then
            echo "Tidak ada perubahan data baru untuk di-commit."
          else
            git commit -m "Auto-update dataset hasil preprocessing"
            git push
          fi